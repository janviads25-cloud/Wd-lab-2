<!DOCTYPE html>

<html lang="en">

<head>

<meta charset="UTF-8">

<title>HTML Frames Example</title>

</head>

<body>

<h1>Travel and Tourist Places</h1>

<!-- Embedding Google Maps -->

<h2>Taj Mahal Location Map</h2>

<iframe 
src="https://www.google.com/maps?q=Taj+Mahal+Agra&output=embed" 
width="600" 
height="400" 
style="border:0;" 
allowfullscreen="" 
loading="lazy">
</iframe>

<!-- Embedding an external webpage -->

<h2>Tourism Information</h2>

<iframe 
src="https://www.britannica.com/place/Taj-Mahal" 
width="600" 
height="400">
</iframe>

</body>

</html>
