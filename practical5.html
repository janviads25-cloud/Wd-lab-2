<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Seminar Registration Form</title>
</head>
<body>

    <h2>Seminar Registration Form</h2>
    
    <form action="/submit" method="post">
    
        <label for="name">Full Name:</label>
        <input type="text" id="name" name="name" required><br><br>


        <label for="email">Email Address:</label>
        <input type="email" id="email" name="email" required><br><br>

        <label>Gender:</label><br>
        <input type="radio" id="male" name="gender" value="male">
        <label for="male">Male</label><br>
        <input type="radio" id="female" name="gender" value="female">
        <label for="female">Female</label><br><br>

       
        <label for="topics">Select the topics you're interested in:</label><br>
        <input type="checkbox" id="topic1" name="topics" value="Technology">
        <label for="topic1">Technology</label><br>
        <input type="checkbox" id="topic2" name="topics" value="Health">
        <label for="topic2">Health</label><br>
        <input type="checkbox" id="topic3" name="topics" value="Business">
        <label for="topic3">Business</label><br><br>

        <!-- Submit Button -->
        <input type="submit" value="Register">
    </form>

</body>
</html>
