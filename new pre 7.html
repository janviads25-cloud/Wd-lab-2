<!DOCTYPE html>
<html>
<head>
    <title>Tribute Page</title>
    
    <style>
        body {
            margin: 0;
            font-family: Arial;
            background: linear-gradient(to right, #dfe9f3, #ffffff);
        }

        /* Navigation Bar */
        .navbar {
            background-color: #333;
            padding: 10px;
            text-align: center;
        }

        .navbar a {
            color: white;
            margin: 15px;
            text-decoration: none;
            font-size: 18px;
        }

        .navbar a:hover {
            color: yellow;
        }

        /* Layout */
        .container {
            width: 80%;
            margin: auto;
            padding: 20px;
        }

        /* Profile Box */
        .profile {
            border: 3px solid #444;
            padding: 20px;
            text-align: center;
            background-color: #f9f9f9;
            border-radius: 10px;
        }

        /* Image */
        img {
            width: 200px;
            border-radius: 10px;
            border: 2px solid black;
        }

        /* Text Styling */
        h1 {
            color: #333;
        }

        p {
            font-size: 18px;
            color: #555;
        }
    </style>
</head>

<body>

    <!-- Navigation Bar -->
    <div class="navbar">
        <a href="#">Tribute page</a>
    </div>

    <!-- Main Content -->
    <div class="container">
        <div class="profile">
            <h1>Dr. A.P.J. Abdul Kalam</h1>
            
            <img src="https://tse2.mm.bing.net/th/id/OIP.VmXTIvoeDcBz_2svn_waOAHaFl?rs=1&pid=ImgDetMain&o=7&rm=3" alt="Kalam Image">

            <p>
                Dr. A.P.J. Abdul Kalam was a great scientist and the 11th President of India.
                He is known as the "Missile Man of India".
            </p>

            <p>
                He inspired millions with his simple life, powerful thoughts,
                and contribution to science and education.
            </p>
        </div>
    </div>

</body>
</html>
